# LLM-Native 预训练模型配置文件
# 此文件定义了项目中可能使用的各种模型及其下载配置

# 嵌入模型 (用于知识库向量化)
embedding_models:
  - name: "microsoft/unixcoder-base"
    description: "专门为代码设计的单语言嵌入模型，适合代码语义理解"
    size: "500MB"
    use_cases: ["code_embedding", "semantic_search"]
    priority: "high"

  - name: "BAAI/bge-m3"
    description: "多语言、多任务的通用嵌入模型，支持中英文混合"
    size: "2.2GB"
    use_cases: ["text_embedding", "multilingual", "retrieval"]
    priority: "high"

  - name: "sentence-transformers/paraphrase-MiniLM-L3-v2"
    description: "轻量级通用句子嵌入模型，适合快速原型开发"
    size: "90MB"
    use_cases: ["general_embedding", "lightweight"]
    priority: "medium"

# 知识库专用模型 (专门为知识库系统优化的模型)
knowledge_models:
  - name: "microsoft/unixcoder-base"
    description: "代码专用嵌入模型，专为知识库代码语义检索优化"
    size: "500MB"
    use_cases: ["code_semantic_search", "knowledge_retrieval"]
    priority: "high"
    category: "code_embedding"

  - name: "BAAI/bge-m3"
    description: "多语言混合检索模型，支持中英文API文档检索"
    size: "2.2GB"
    use_cases: ["multilingual_retrieval", "hybrid_search"]
    priority: "high"
    category: "text_embedding"

  - name: "sentence-transformers/paraphrase-MiniLM-L3-v2"
    description: "轻量化备选嵌入模型，用于快速原型和测试"
    size: "90MB"
    use_cases: ["lightweight_embedding", "testing"]
    priority: "medium"
    category: "general_embedding"

# 生成模型 (可选，用于本地推理)
generation_models:
  - name: "microsoft/DialoGPT-medium"
    description: "对话生成模型，可用于测试对话式交互"
    size: "1.5GB"
    use_cases: ["dialogue_generation", "testing"]
    priority: "low"

  - name: "distilbert-base-uncased"
    description: "轻量级BERT模型，可用于文本分类和理解"
    size: "250MB"
    use_cases: ["text_classification", "feature_extraction"]
    priority: "medium"

# 下载配置
download:
  # 默认下载策略
  default_strategy: "auto"  # auto: 自动选择最佳下载方式

  # 网络配置
  network:
    timeout: 600  # 下载超时时间(秒)，增加到10分钟
    retries: 3    # 重试次数
    max_concurrent: 1  # 最大并发下载数，减少以避免网络问题

  # 存储配置
  storage:
    base_dir: "pretrained_models"  # 更新为新的目录名
    embedding_dir: "pretrained_models/embedding"  # 嵌入模型存储目录
    generation_dir: "pretrained_models/generation"  # 生成模型存储目录
    knowledge_dir: "knowledge_base_models"  # 知识库模型专用目录
    knowledge_embedding_dir: "knowledge_base_models/embedding"  # 知识库嵌入模型目录
    cache_dir: "pretrained_models/cache"  # 缓存目录
    use_symlinks: false  # 是否使用符号链接

  # 筛选配置
  filter:
    by_priority: ["high", "medium"]  # 只下载指定优先级的模型
    skip_large_models: false  # 是否跳过大模型
    max_model_size: "5GB"  # 单个模型最大大小限制

# DeepSeek API配置 (无需下载，本地缓存配置)
deepseek:
  models:
    - name: "deepseek-chat"
      description: "DeepSeek通用对话模型"
      context_length: 32768
      api_endpoint: "https://api.deepseek.com/v1/chat/completions"
    - name: "deepseek-reasoner"
      description: "DeepSeek推理增强模型"
      context_length: 32768
      api_endpoint: "https://api.deepseek.com/v1/chat/completions"

  # API缓存配置
  cache:
    enabled: true
    dir: "pretrained_models/cache/deepseek"
    max_age_days: 7  # 缓存有效期

# 环境变量配置
environment:
  # HuggingFace环境变量
  huggingface:
    HF_HOME: "pretrained_models"
    TRANSFORMERS_CACHE: "pretrained_models/cache"
    KNOWLEDGE_MODELS_HOME: "knowledge_base_models"

  # 知识库系统环境变量
  knowledge_base:
    VECTOR_DB_PATH: "data/knowledge/vectors"
    EMBEDDING_MODEL: "microsoft/unixcoder-base"
    RERANKER_MODEL: "BAAI/bge-m3"

  # 模型路径映射
  model_paths:
    embedding_base: "pretrained_models/embedding"
    generation_base: "pretrained_models/generation"
    knowledge_base: "knowledge_base_models"
    knowledge_embedding_base: "knowledge_base_models/embedding"
    default_embedding: "microsoft/unixcoder-base"  # 默认嵌入模型
    default_generation: "deepseek-chat"  # 默认生成模型（API）
    knowledge_embedding: "microsoft/unixcoder-base"  # 知识库专用嵌入模型
    knowledge_reranker: "BAAI/bge-m3"  # 知识库重排序模型
