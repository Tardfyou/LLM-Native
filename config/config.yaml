# LLM-Native Static Analysis Framework Configuration

# Project Settings
project:
  name: "LLM-Native Static Analysis Framework"
  version: "0.1.0"
  description: "面向缺陷检测的大预言模型原生静态分析框架"

# Directory Paths
# 这些路径会被 environment.py 自动检测和覆盖
# 在容器内: 使用 /app 前缀
# 在宿主机: 自动检测项目根目录
# 也可以通过环境变量覆盖:
#   - LLM_NATIVE_ROOT: 项目根目录
#   - LLM_NATIVE_DATA: 数据目录
#   - LLM_NATIVE_RESULTS: 结果目录
#   - LLM_NATIVE_LOGS: 日志目录
paths:
  root_dir: "${LLM_NATIVE_ROOT:-/app}"
  src_dir: "${LLM_NATIVE_ROOT:-/app}/src"
  data_dir: "${LLM_NATIVE_DATA:-${LLM_NATIVE_ROOT:-/app}/data}"
  results_dir: "${LLM_NATIVE_RESULTS:-${LLM_NATIVE_ROOT:-/app}/results}"
  logs_dir: "${LLM_NATIVE_LOGS:-${LLM_NATIVE_ROOT:-/app}/logs}"
  knowledge_dir: "${LLM_NATIVE_ROOT:-/app}/data/knowledge"
  benchmarks_dir: "${LLM_NATIVE_ROOT:-/app}/data/benchmarks"
  config_dir: "${LLM_NATIVE_ROOT:-/app}/config"
  prompt_templates_dir: "${LLM_NATIVE_ROOT:-/app}/prompt_templates"

# LLM Configuration
llm:
  # Primary model for generation
  # Supported providers and models:
  #
  # DeepSeek:
  #   - deepseek-chat: 通用对话模型
  #   - deepseek-reasoner: 推理增强模型
  #
  # OpenAI:
  #   - gpt-4, gpt-4-turbo, gpt-4o, gpt-4o-mini
  #   - o1, o1-preview, o3-mini, o4-mini (推理模型)
  #
  # 智谱AI (GLM):
  #   - glm-4.7: 最新旗舰模型 (推荐)
  #   - glm-4, glm-4-air, glm-4-flash, glm-3-turbo
  #
  # 自定义/本地:
  #   - 使用 UniversalClient，需要配置 base_url
  primary_model: "deepseek-reasoner"

  # 快速模型 - 用于 repair 等需要快速响应的场景
  # deepseek-reasoner: DeepSeek 推理模型（推荐用于修复，避免GLM并发限制）
  # glm-4-flash: GLM 快速模型
  # glm-4-air: GLM 中等速度，平衡性能
  fast_model: "deepseek-chat"

  # 可选: 自定义 API 端点 (如果需要)
  # base_url: "https://your-custom-endpoint.com/v1"

  # API keys configuration - 支持多个提供商
  keys:
    # DeepSeek API Key
    deepseek_key: "sk-6b1ae1bdb0e24c0189f0f0e9db43a94a"

    # OpenAI API Key (如果使用 OpenAI 模型)
    # openai_key: "sk-your-openai-api-key"

    # 智谱AI API Key (如果使用 GLM 模型)
    # 获取方式: https://open.bigmodel.cn/usercenter/apikeys
    glm_key: "357fccd9856d47a8856640683f6513f9.mWjMS8XVD6HEKYP3"  # 标准API Key格式

    # 通用 API Key (用于自定义端点)
    # api_key: "your-api-key"

  # Generation parameters
  generation:
    temperature: 0.3  # 默认温度（向后兼容）
    max_tokens: 8192  # deepseek-chat 上限是 8192
    top_p: 0.95
    frequency_penalty: 0.0
    presence_penalty: 0.0

  # 分阶段温度设置
  stage_temperature:
    # 漏洞模式分析阶段 - 高温激发创造力
    analysis: 1.0
    # 代码生成阶段 - 低温确保精确性
    code_generation: 0.0
    # 代码修复阶段 - 低温确保确定性输出
    repair: 0.0

  # Request parameters
  timeout: 120
  max_retries: 6

  # Rate limiting
  rate_limit:
    requests_per_minute: 60
    tokens_per_minute: 100000

  # 模型切换示例:
  #
  # 使用 DeepSeek:
  #   primary_model: "deepseek-chat"
  #   keys.deepseek_key: "sk-xxx"
  #
  # 使用 OpenAI GPT-4o:
  #   primary_model: "gpt-4o"
  #   keys.openai_key: "sk-xxx"
  #
  # 使用 智谱AI GLM-4.7:
  #   primary_model: "glm-4.7"
  #   keys.glm_key: "your-glm-api-key"
  #
  # 使用自定义/本地模型 (如 Ollama):
  #   primary_model: "llama3"  # 或任何模型名
  #   base_url: "http://localhost:11434/v1"
  #   keys.api_key: "ollama"  # 某些服务可能不需要
  #
  # 使用 Azure OpenAI:
  #   primary_model: "gpt-4"
  #   base_url: "https://your-resource.openai.azure.com/openai/deployments/your-deployment"
  #   keys.openai_key: "your-azure-api-key"

# Knowledge Base Configuration
knowledge_base:
  # Vector database settings
  vector_db:
    type: "chromadb"  # Options: chromadb, milvus, qdrant

    # ChromaDB 连接模式:
    # - "auto": 自动检测（推荐）- 优先尝试连接远程服务器，失败则使用本地持久化
    # - "remote": 强制使用远程 ChromaDB 服务器
    # - "local": 强制使用本地持久化存储
    mode: "auto"

    # 远程连接设置（当 mode 为 remote 或 auto 时使用）
    # 可通过环境变量 CHROMA_HOST 和 CHROMA_PORT 覆盖
    host: "${CHROMA_HOST:-localhost}"
    port: ${CHROMA_PORT:-8001}

    collection: "llm_native_knowledge"  # 与import_knowledge.py保持一致

    # 本地持久化目录（当 mode 为 local 或 auto 时使用）
    # 在容器内: /app/data/knowledge/vector_cache
    # 在宿主机: 自动检测项目目录下的 data/knowledge/vector_cache
    persist_directory: "${LLM_NATIVE_ROOT:-/app}/data/knowledge/vector_cache"

    # Embedding model
    embedding_model: "microsoft/unixcoder-base"
    # Retrieval settings
    top_k: 2
    similarity_threshold: 0.7
    # Hybrid retrieval weights
    dense_weight: 0.7
    sparse_weight: 0.3

  # Data sources
  data_sources:
    frameworks:
      - name: "clang"
        enabled: true
        docs_url: "https://clang.llvm.org/docs/"
        api_docs_dir: "/data/knowledge/clang"
      - name: "codeql"
        enabled: true
        docs_url: "https://codeql.github.com/docs/"
        api_docs_dir: "/data/knowledge/codeql"
    cwe_sources:
      - name: "mitre_cwe"
        enabled: true
        base_url: "https://cwe.mitre.org/data/definitions/"
        cache_dir: "/data/knowledge/cwe"

# Generation Engine Configuration
generator:
  # Pipeline stages
  pipeline:
    - "pattern_extraction"
    - "plan_generation"
    - "code_generation"
    - "syntax_repair"
    - "validation"

  # Maximum iterations for self-healing
  max_iterations: 3

  # Code generation settings
  code_gen:
    target_frameworks: ["clang", "codeql"]
    supported_languages: ["cpp", "java", "python"]
    # Template settings
    use_templates: true
    template_dir: "/app/prompt_templates"

  # Compilation settings
  compilation:
    clang_version: "14"
    llvm_dir: "/usr/lib/llvm-14"
    clangd_path: "/usr/lib/llvm-14/bin/clangd"
    timeout_seconds: 300

# Validation Configuration
validator:
  # Validation layers
  layers:
    - "compilation"
    - "semantic_consistency"
    - "performance_test"

  # Compilation validation
  compilation:
    enabled: true
    clang_flags: ["-std=c++20", "-O0", "-g", "-Wall", "-Wextra"]
    timeout_seconds: 60

  # Semantic validation
  semantic:
    enabled: true
    test_cases_dir: "/app/data/benchmarks/test_cases"
    positive_samples: 10
    negative_samples: 10

  # Performance validation
  performance:
    enabled: true
    max_execution_time: 30
    memory_limit_mb: 512

# Evaluator Configuration
evaluator:
  # Benchmark datasets
  benchmarks:
    - name: "juliet_suite"
      enabled: true
      path: "/data/benchmarks/juliet"
      supported_cwes: ["CWE-119", "CWE-125", "CWE-416", "CWE-476"]
    - name: "custom_dataset"
      enabled: true
      path: "/data/benchmarks/custom"
      supported_cwes: ["CWE-22", "CWE-78", "CWE-79", "CWE-94"]

  # Metrics to compute
  metrics:
    - "compilation_success_rate"
    - "functional_correctness"
    - "false_positive_rate"
    - "precision"
    - "recall"
    - "f1_score"

  # Statistical analysis
  statistics:
    confidence_level: 0.95
    num_iterations: 5

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/app/logs/llm_native.log"
  max_file_size: "10 MB"
  backup_count: 5

  # Component-specific logging
  components:
    knowledge_base: "DEBUG"
    generator: "INFO"
    validator: "INFO"
    evaluator: "INFO"

# API Server Configuration
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins: ["*"]

  # API endpoints
  endpoints:
    generate_detector: "/api/v1/generate"
    validate_detector: "/api/v1/validate"
    evaluate_detector: "/api/v1/evaluate"
    knowledge_search: "/api/v1/knowledge/search"

# Development Settings
development:
  enable_debug: false
  enable_profiling: false
  mock_llm_responses: false
  use_cache: false
  cache_dir: "/app/.cache"
