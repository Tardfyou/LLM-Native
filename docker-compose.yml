version: '3.8'

services:
  # Production Framework Service
  framework:
    build:
      context: .
      dockerfile: Dockerfile.prod  # 使用生产Dockerfile
    environment:
      - PYTHONPATH=/app/src:/app
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
      - DEEPSEEK_API_KEY=sk-6b1ae1bdb0e24c0189f0f0e9db43a94a
      - HF_HOME=/app/pretrained_models
      - TRANSFORMERS_CACHE=/app/pretrained_models
    ports:
      - "8000:8000"  # API service port
    volumes:
      - ./pretrained_models:/app/pretrained_models:ro  # 预训练模型挂载 (只读)
      - knowledge_data:/app/data/knowledge
      - benchmark_data:/app/data/benchmarks
      - ./results:/app/results  # 改为本地目录绑定
      - ./logs:/app/logs  # 改为本地目录绑定
    working_dir: /app
    command: ["python3", "-m", "uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - vector-db
    profiles:
      - prod

  # Development Framework Service (推荐用于开发调试)
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm_native_dev
    volumes:
      - .:/app:cached  # 代码热重载 - 修改代码后立即生效
      - ./pretrained_models:/app/pretrained_models:cached  # 预训练模型挂载
      - knowledge_data:/app/data/knowledge
      - benchmark_data:/app/data/benchmarks
      - ./results:/app/results  # 改为本地目录绑定，便于查看输出
      - ./logs:/app/logs  # 改为本地目录绑定，便于查看日志
    environment:
      - PYTHONPATH=/app/src:/app
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
      - DEEPSEEK_API_KEY=sk-6b1ae1bdb0e24c0189f0f0e9db43a94a
      - LOG_LEVEL=DEBUG  # 开发模式更详细的日志
      - HF_HOME=/app/pretrained_models
      - TRANSFORMERS_CACHE=/app/pretrained_models
    ports:
      - "8000:8000"  # API service port
      - "8501:8501"  # Streamlit interface (if used)
    working_dir: /app
    command: ["bash"]  # 启动bash，便于交互调试
    depends_on:
      - vector-db
    profiles:
      - dev

  # Vector Database Service (for RAG)
  vector-db:
    image: chromadb/chroma:latest
    container_name: llm_native_vector_db
    ports:
      - "8001:8000"
    volumes:
      - vector_db_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000


  # Clang Environment Testing Service
  clang-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm_native_clang_test
    volumes:
      - .:/app:cached
    environment:
      - PYTHONPATH=/app/src:/app
      - CLANG_TEST=1
    working_dir: /app
    command: ["python3", "scripts/test_clang_environment.py"]
    profiles:
      - clang-test

  # General Testing Service
  test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:cached
      - test_results:/app/test-results
    environment:
      - PYTHONPATH=/app/src:/app
      - TEST_ENV=1
    working_dir: /app
    command: ["python3", "-m", "pytest", "tests/", "-v", "--tb=short", "--cov=src", "--cov-report=html:test-results/coverage"]
    profiles:
      - test

volumes:
  framework_cache:
  knowledge_data:
  benchmark_data:
  # results 和 logs 改为本地目录绑定，不再使用 named volumes
  vector_db_data:
  test_results:
