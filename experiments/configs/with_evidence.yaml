# 证据系统配置: Generate + 证据系统，无 Refine
experiment:
  name: "with_evidence"
  description: "Generate with evidence system, without refinement"

patchweaver:
  enabled: true
  preflight_analysis: true
  max_planned_requirements: 8

evidence:
  enabled: true
  types:
    - patch_fact
    - semantic_slice
    - dataflow_candidate
    - call_chain
    - allocation_lifecycle
    - state_transition
    - path_guard
    - context_summary
    - validation_outcome

generate:
  max_iterations: 12
  max_knowledge_search_calls: 2
  temperature: 0.15

refine:
  enabled: false

quality_gates:
  artifact_review:
    enabled: true
  lsp_validation:
    enabled: true