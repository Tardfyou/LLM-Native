# 基线配置: 仅 Generate，无证据系统
experiment:
  name: "baseline"
  description: "Generate only without evidence system"

patchweaver:
  enabled: false
  preflight_analysis: false

evidence:
  enabled: false

generate:
  max_iterations: 12
  max_knowledge_search_calls: 2
  temperature: 0.15

refine:
  enabled: false

quality_gates:
  artifact_review:
    enabled: true
  lsp_validation:
    enabled: true